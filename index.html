<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle | AI Web</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="header">
    <h1>8-Puzzle Juego Interactivo</h1>
    <p class="subtitle">Juegos y Agentes Inteligentes</p>
</header>

<main class="container">
    <section class="dashboard">
        <div class="controls">
            <div class="control-group">
                <label for="game-mode">Modo de Juego</label>
                <select id="game-mode">
                    <option value="HvIA">Humano vs IA</option>
                    <option value="HvH">Humano vs Humano</option>
                </select>
            </div>

            <div class="control-group">
                <label for="difficulty">Dificultad</label>
                <select id="difficulty">
                    <option value="easy">Fácil</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>

            <button id="start-btn" class="btn-primary">Iniciar Partida</button>
        </div>

        <div class="goal-section">
            <span>Objetivo:</span>
            <div id="goal-board" class="board mini-board"></div>
        </div>
    </section>

    <section class="game-area">
        <div class="player-zone card">
            <h2>Jugador 1</h2>
            <div class="stats">Movimientos: <span id="stats-1" class="badge">0</span></div>
            <div id="board-1" class="board"></div>
        </div>

        <div class="player-zone card">
            <h2>IA / Jugador 2</h2>
            <div class="stats">Movimientos: <span id="stats-2" class="badge">0</span></div>
            <div id="board-2" class="board"></div>
        </div>
    </section>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
