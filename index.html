<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>8-Puzzle Game</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .game-area { display: flex; justify-content: center; gap: 50px; margin-top: 20px; }
        .player-zone { text-align: center; }
        .controls { text-align: center; margin: 20px; padding: 10px; background: #eee; }
    </style>
</head>
<body>
<h1>8-Puzzle: Juego Interactivo</h1>

<div class="controls">
    <select id="game-mode">
        <option value="HvIA">Jugador vs AI</option>
        <option value="HvH">Jugador vs Jugador</option>
    </select>

    <select id="difficulty">
        <option value="easy">Fácil</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Difícil</option>
    </select>

    <button id="start-btn">Iniciar Juego</button>
</div>

<div class="game-area">
    <div class="player-zone">
        <h2>Jugador 1</h2>
        <p>Movimientos: <span id="stats-1">0</span></p>
        <div id="board-1" class="board"></div>
    </div>

    <div class="player-zone">
        <h2>Jugador 2 / IA</h2>
        <p>Movimientos: <span id="stats-2">0</span></p>
        <div id="board-2" class="board"></div>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
